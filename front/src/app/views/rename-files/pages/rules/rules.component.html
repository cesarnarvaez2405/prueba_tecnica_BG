<div class="p-4">
  <h3 class="text-xl font-bold pb-2">Rules</h3>

  <div class="flex justify-between items-center pb-4">
    <div class="flex items-center gap-2">
      <input
        type="checkbox"
        id="includeInactive"
        class="w-4 h-4 cursor-pointer"
        [checked]="includeInactive()"
        (change)="onIncludeInactiveChange($event)"
      />
      <label for="includeInactive" class="cursor-pointer select-none">
        Incluir inactivas
      </label>
    </div>
    <button
      class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition-colors"
      (click)="handleCreate()"
    >
      Crear rule
    </button>
  </div>

  @if (rulesResource.isLoading()) {
    <p>Cargando reglas...</p>
  } @else {
    <table-component
      [colDefs]="colDefs"
      [rowData]="rulesResource.value() ?? []"
      [defaultColDef]="defaultColDef"
    ></table-component>
  }
</div>
